  <style>
    :root {
      scroll-behavior: smooth;
      --safe-area-inset-top: env(safe-area-inset-top, 0px);
      --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
      --primary: #006638;
      --accent: #10B981;
      --bg: #F8FAFC;
    }

    /* Global Smooth Scrolling and Scrollbar Hiding */
    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      /* Prevent body scroll to stop double-scroll issues */
      position: fixed;
      /* Lock body on mobile */
      overscroll-behavior: none;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      /* Momentum scrolling for iOS */
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: var(--bg);
      margin: 0;
      padding: 0;
    }

    /* Animation Definitions */
    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .animate-slide-up-full {
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .animate-scale-in {
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Thermal Receipt Style */
    .receipt-font {
      font-family: 'Roboto Mono', monospace;
    }

    .receipt-paper {
      background: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .receipt-paper::before,
    .receipt-paper::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 10px;
      background-size: 20px 20px;
    }

    .receipt-paper::before {
      top: -10px;
      background-image: radial-gradient(circle at 10px -5px, transparent 12px, white 13px);
    }

    .receipt-paper::after {
      bottom: -10px;
      background-image: radial-gradient(circle at 10px 25px, transparent 12px, white 13px);
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #printable-receipt,
      #printable-receipt * {
        visibility: visible;
      }

      #printable-receipt {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        margin: 0;
        padding: 20px;
        box-shadow: none !important;
      }

      .no-print {
        display: none !important;
      }

      @page {
        margin: 0;
      }
    }

    /* Mobile Layout Fixes */
    .pb-safe {
      padding-bottom: var(--safe-area-inset-bottom);
    }

    .pt-safe {
      padding-top: var(--safe-area-inset-top);
    }

    /* Disable Tap Highlight & Focus Outlines (Mobile Polish) */
    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button:focus,
    button:active {
      outline: none !important;
      box-shadow: none !important;
    }
  </style>
